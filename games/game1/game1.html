<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>風神録</title>
<link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAycOq5BxpzLitBIHMmgDiFTQRf0nCPJ1ilg&s" sizes="16×16" type="image/png" /> 
<style>
body{margin:0;background:#000;overflow:hidden;font-family:sans-serif}
canvas{display:block;margin:0 auto;background:#000}

/* メニュー */
#menu{
 position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
 background:#000;color:#fff;flex-direction:column;gap:16px;z-index:10;
 transition:all 0.3s;
}
#menu h1{margin:0 0 20px 0;font-size:32px;}
.div-option{
 padding:10px 20px;font-size:24px;color:white;transition:all 0.2s;cursor:pointer;
}
.div-option.selected{color:red;font-size:36px;transform: scale(1.2);}

/* Overlay */
#overlay{
 position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
 font-family:sans-serif;z-index:20;display:none;
 overflow:hidden;
}
#overlayCanvas{
 position:absolute;inset:0; z-index:1;
}
#overlay h1,#overlay p,#overlay button{
 position:relative; z-index:2;
 text-align:center;
}
#overlay h1{font-size:72px;margin:0;text-shadow:2px 2px 10px #000;}
#overlay p{font-size:28px;margin:20px;text-shadow:1px 1px 5px #000;}
#overlay button{
 font-size:28px;padding:12px 30px;cursor:pointer;
 border:none;background:linear-gradient(45deg,#ff0,#f0f);color:#000;
 text-shadow:1px 1px 2px #fff;
 transition:0.3s;
}
#overlay button:hover{
 background:linear-gradient(45deg,#f0f,#0ff);
 transform:scale(1.1);
}
</style>
</head>
<body>

<div id="menu">
 <h1>Difficulty Select</h1>
<div class="div-option" data-d="Safety">Safety</div>
 <div class="div-option" data-d="Easy">Easy</div>
 <div class="div-option" data-d="Normal">Normal</div>
 <div class="div-option" data-d="Hard">Hard</div>
 <div class="div-option" data-d="Lunatic">Lunatic</div>
</div>

<div id="overlay">
 <canvas id="overlayCanvas"></canvas>
 <h1 id="overlay-title"></h1>
 <p id="overlay-score"></p>
 <button id="overlay-btn">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=480; canvas.height=720;

// ===== 難易度 =====
const diffData={
 Safety:{mul:0.4,rate:220,hpMul:0.5},
 Easy:{mul:0.7,rate:120,hpMul:1},
 Normal:{mul:1,rate:90,hpMul:1},
 Hard:{mul:1.4,rate:60,hpMul:1},
 Lunatic:{mul:3,rate:20,hpMul:2}
};

let DIFF=diffData.Normal;

// ===== メニュー =====
// ===== メニュー =====
const menu=document.getElementById("menu");
const options = Array.from(menu.querySelectorAll(".div-option"));
let selectedIndex = 0;

function updateMenuVisual(){
  options.forEach((o,i)=>{
    o.classList.toggle("selected", i===selectedIndex);
  });
}

updateMenuVisual();

document.addEventListener("keydown",e=>{
 if(menu.style.display!=='none'){
   if(e.key==='ArrowUp'){
     selectedIndex=(selectedIndex+options.length-1)%options.length;
     updateMenuVisual();
   }
   if(e.key==='ArrowDown'){
     selectedIndex=(selectedIndex+1)%options.length;
     updateMenuVisual();
   }
   if(e.key==='Enter'){
     selectDifficulty();
   }
 }
});

// ★ ここが重要修正 ★
options.forEach((o,i)=>{
  o.addEventListener("click",()=>{
    selectedIndex = i;   // ← ちゃんと更新
    updateMenuVisual();
    selectDifficulty();
  });

  o.addEventListener("touchstart",()=>{
    selectedIndex = i;   // ← タッチでも更新
    updateMenuVisual();
    selectDifficulty();
  });
});

function selectDifficulty(){
 DIFF = diffData[options[selectedIndex].dataset.d];
 menu.style.display='none';
 startGame();
}


// ===== プレイヤー =====
const player={x:240,y:620,r:3,lives:3,bomb:3,inv:0,bombing:0};
// Safetyだけ残機5
function applySafetyLives(){
  if(DIFF===diffData.Safety){
    player.lives = 5;
  }
}

let autoFire=false;
const keys={};
document.onkeydown=e=>{
 keys[e.key]=true;
 if(e.key==='p') paused=!paused;
 if(e.key==='x') autoFire=!autoFire;
 if(e.key==='b' && player.bomb>0 && player.bombing===0){player.bomb--; player.bombing=120; enemyBullets=[]; lasers=[]; effect(player.x,player.y,120);}
};
document.onkeyup=e=>keys[e.key]=false;
let paused=false;

// ===== 弾管理 =====
let shots=[],enemyBullets=[],lasers=[],effects=[];

// ===== ボス =====
let stage=1;
const boss={
  x:240,y:120,
  vx:2,vy:0,
  hp:1500,maxHp:1500,
  active:false,
  moveTimer:0,
  angle:0   // ← 追加
};


// ===== エフェクト =====
function effect(x,y,n){for(let i=0;i<n;i++)effects.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,t:30});}

// ===== 弾幕 =====
function circle(x,y,n,s){for(let i=0;i<n;i++){let a=i*Math.PI*2/n;enemyBullets.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s});}}
function spiral(x,y,t){let count=DIFF===diffData.Lunatic?24:16;for(let i=0;i<count;i++){let a=t*0.15+i*0.25;let spd=DIFF===diffData.Lunatic?3:2.5;enemyBullets.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});}}
function rain(){let cnt=DIFF===diffData.Lunatic?30*DIFF.mul:20*DIFF.mul;for(let i=0;i<cnt;i++)enemyBullets.push({x:Math.random()*480,y:0,vx:0,vy:(2+Math.random()*3)*DIFF.mul});}
function laser(x){lasers.push({x,w:10,t:DIFF===diffData.Lunatic?120:90});}

// ===== 完全星型弾幕 =====
function starSpell(x,y,t){
  const points = 5;              // 星の頂点
  const skip = 2;               // 1個飛ばしで結ぶ（星になる）
  const radius = 60;
  const speed = DIFF===diffData.Lunatic ? 3.8 : 2.2;

  // 五角形の頂点を作る
  let verts=[];
  for(let i=0;i<points;i++){
    let a = -Math.PI/2 + i*(Math.PI*2/points);
    verts.push({
      x:x + Math.cos(a)*radius,
      y:y + Math.sin(a)*radius
    });
  }

  // 星の線をなぞる弾を発射
  for(let i=0;i<points;i++){
    let from = verts[i];
    let to   = verts[(i+skip)%points];

    let dx = to.x-from.x;
    let dy = to.y-from.y;
    let len = Math.hypot(dx,dy);

    let vx = dx/len * speed;
    let vy = dy/len * speed;

    // 線上に等間隔で弾を置く
    for(let j=0;j<len;j+=12){
      enemyBullets.push({
        x: from.x + vx*j,
        y: from.y + vy*j,
        vx: vx,
        vy: vy
      });
    }
  }
}


// ===== ボス移動 =====
function moveBoss(){boss.moveTimer++;boss.x+=boss.vx;if(boss.x<60||boss.x>420)boss.vx*=-1;if(boss.moveTimer%120===0)boss.vy=(Math.random()>0.5?1:-1)*2;boss.y+=boss.vy;if(boss.y<80||boss.y>200)boss.vy*=-1;}

// ===== 6WAYショット =====
function shoot6() {
    const slow = keys['Shift'];
    const speed = 7; // 速さ
    if (slow) {
        const offsets = [-24, -14, -6, 6, 14, 24];
        offsets.forEach(off => shots.push({
            x: player.x + off,
            y: player.y,
            vx: 0,
            vy: -speed
        }));
    } else {
        const angles = [-0.55, -0.32, -0.16, 0.16, 0.32, 0.55];
        angles.forEach(a => shots.push({
            x: player.x,
            y: player.y,
            vx: Math.sin(a) * speed,
            vy: -Math.cos(a) * speed
        }));
    }
}


// ===== Overlay =====
const overlay=document.getElementById("overlay");
const overlayCanvas=document.getElementById("overlayCanvas");
const octx=overlayCanvas.getContext("2d");
overlayCanvas.width=480; overlayCanvas.height=720;
const overlayTitle=document.getElementById("overlay-title");
const overlayScore=document.getElementById("overlay-score");
const overlayBtn=document.getElementById("overlay-btn");
overlayBtn.onclick = ()=>{location.reload();};

let overlayParticles=[],overlayScale=1,overlayScaleDir=0.02;
function initOverlayParticles(color){
 overlayParticles=[];
 for(let i=0;i<150;i++){overlayParticles.push({x:Math.random()*480,y:Math.random()*720,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,r:Math.random()*3+1,color:color});}
}
function drawOverlayParticles(){octx.clearRect(0,0,480,720);overlayParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>480)p.vx*=-1;if(p.y<0||p.y>720)p.vy*=-1;octx.fillStyle=p.color;octx.beginPath();octx.arc(p.x,p.y,p.r,0,Math.PI*2);octx.fill();});requestAnimationFrame(drawOverlayParticles);}
function showOverlay(type){
 overlay.style.display='flex';
 overlayTitle.textContent = type==="gameover"?"GAME OVER":"★ GAME CLEAR ★";
 overlayTitle.style.color = type==="gameover"?"#ff4444":"#44f";
 overlayScore.textContent = `Score: ${score}`;
 overlayScale=1;
 initOverlayParticles(type==="gameover"?"#ff4444":"#44f");
 drawOverlayParticles();
 if(type==="gameclear") effects.push({x:240,y:360,vx:0,vy:0,t:200,star:true});
}

// ===== メイン =====
let timer=0,score=0;
function startGame(){requestAnimationFrame(loop);}
function update(){
 if(paused) return;
 timer++; if(player.inv>0)player.inv--; if(player.bombing>0)player.bombing--;

 let sp=keys['Shift']?2:4;
 if(keys['ArrowLeft'])player.x-=sp;if(keys['ArrowRight'])player.x+=sp;if(keys['ArrowUp'])player.y-=sp;if(keys['ArrowDown'])player.y+=sp;
 if(autoFire && timer%5===0) shoot6();

 shots.forEach(s=>{s.x+=s.vx;s.y+=s.vy;}); shots=shots.filter(s=>s.y>0&&s.x>0&&s.x<480);
 if(timer>120&&!boss.active) boss.active=true;

 if(boss.active){
  moveBoss();
  // stage2は星型弾幕
  // 2体目以降は常時星弾幕
if(stage>=2 && timer%(DIFF===diffData.Safety?90:22)===0){

  let interval = DIFF===diffData.Safety ? 90 : 30;
  if(timer%interval===0){
    starSpell(boss.x,boss.y,timer);
  }
// ボス回転
if(boss.active){
  boss.angle += 0.03;   // 回転速度
}
// スマホ移動
if(touching){
  player.x += (touchX-player.x)*0.2;
  player.y += (touchY-player.y)*0.2;
}

}

  if(timer%DIFF.rate===0) circle(boss.x,boss.y,DIFF===diffData.Lunatic?60*DIFF.mul:48*DIFF.mul,2.2*DIFF.mul);
  if(timer%(DIFF===diffData.Lunatic?15:20)===0) spiral(boss.x,boss.y,timer);
  if(timer%(DIFF===diffData.Lunatic?60:80)===0) rain();
  if(timer%(DIFF===diffData.Lunatic?100:140)===0) laser(Math.random()*480);
  if(DIFF===diffData.Lunatic && timer%50===0) circle(boss.x,boss.y,16,5);
 }

 enemyBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;}); enemyBullets=enemyBullets.filter(b=>b.y<720&&b.x>-20&&b.x<500);
 lasers.forEach(l=>l.t--); lasers=lasers.filter(l=>l.t>0);

 enemyBullets.forEach(b=>{let dx=b.x-player.x,dy=b.y-player.y;if(dx*dx+dy*dy<player.r*player.r && player.inv<=0){player.lives=Math.max(0,player.lives-1);player.inv = DIFF===diffData.Safety ? 240 : 120;
;enemyBullets=[];effect(player.x,player.y,80);}});
 lasers.forEach(l=>{if(player.x>l.x-6 && player.x<l.x+6 && player.inv<=0){player.lives=Math.max(0,player.lives-1);player.inv = DIFF===diffData.Safety ? 240 : 120;
effect(player.x,player.y,60);}});

 if(player.lives===0){showOverlay("gameover");return;}

 shots=shots.filter(s=>{let dx=s.x-boss.x,dy=s.y-boss.y;if(dx*dx+dy*dy<900 && boss.active){boss.hp-=5;score+=10;effect(s.x,s.y,5);return false;}return true;});

if(boss.hp<=0){

  bossExplosion(boss.x,boss.y);

  if(stage===4){
    enemyBullets=[];
    lasers=[];
    showOverlay("gameclear");
    return;
  }

  stage++;
  score+=1000;

  let hpBase = DIFF===diffData.Lunatic ? 3000 : 1500;
  boss.maxHp = (hpBase + (stage-1)*(DIFF===diffData.Lunatic?2000:1000)) * DIFF.hpMul;
  boss.hp = boss.maxHp;

  boss.active=false;
  timer=0;
}


 // 星型爆発エフェクト
 effects.forEach(e=>{
   e.x+=e.vx; e.y+=e.vy; e.t--;
   if(e.star && e.t%5===0){
     for(let i=0;i<8;i++){let a=i*Math.PI/4;enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3});}
   }
 });
 effects=effects.filter(e=>e.t>0);
}

function draw(){

  // ===== 背景フェード =====
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,480,720);

  // ===== 自機 =====
  ctx.fillStyle = (player.inv%10<5) ? "cyan" : "white";

  ctx.beginPath();
  ctx.arc(player.x,player.y,6,0,Math.PI*2);
  ctx.fill();

  // 当たり判定
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  // =========================
  // ===== ボス描画 ==========
  // =========================
  let bossColor="red";

  if(boss.active){

    function getBossColor(){
      switch(stage){
        //case 1: return "deepskyblue";
        case 1: return "deepskyblue";
        case 2: return "lime";
        case 3: return "orange";
        case 4: return "gold";
        default: return "red";
      }
    }

    bossColor = getBossColor();

    function drawStar(outer, inner, points){
      ctx.beginPath();
      for(let i=0;i<points*2;i++){
        let r = (i%2===0)?outer:inner;
        let a = -Math.PI/2 + i*Math.PI/points;
        let x = Math.cos(a)*r;
        let y = Math.sin(a)*r;
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fill();
    }

    ctx.save();
    ctx.translate(boss.x,boss.y);
    ctx.rotate(boss.angle);

    ctx.shadowColor=bossColor;
    ctx.shadowBlur=25;
    ctx.fillStyle=bossColor;

    drawStar(36,14,5);

    ctx.restore();

    // ===== HPバー =====
    ctx.fillStyle="#300";
    ctx.fillRect(20,10,440,14);

    const hpRatio = boss.hp/boss.maxHp;
    const grad = ctx.createLinearGradient(20,0,460,0);
    grad.addColorStop(0,"red");
    grad.addColorStop(0.5,"yellow");
    grad.addColorStop(1,"lime");

    ctx.fillStyle=grad;
    ctx.fillRect(20,10,440*hpRatio,14);
  }

  // ===================================
  // ===== 右端ナビ（▶ 右向き）========
  // ===================================

  // ---- ボス（発光）----
  if(boss.active){
    ctx.shadowColor=bossColor;
    ctx.shadowBlur=15;
    ctx.fillStyle=bossColor;

    let by = Math.max(20, Math.min(700, boss.y));

    ctx.beginPath();
    ctx.moveTo(465, by);
    ctx.lineTo(485, by-14);
    ctx.lineTo(485, by+14);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur=0;
  }

  // ---- 自機（白）----
  ctx.fillStyle="white";

  let py = Math.max(20, Math.min(700, player.y));

  ctx.beginPath();
  ctx.moveTo(465, py);
  ctx.lineTo(485, py-12);
  ctx.lineTo(485, py+12);
  ctx.closePath();
  ctx.fill();


  // ===================================
  // ===== 下端ナビ（▲ 上向き）========
  // ===================================

  // ---- ボス（発光）----
  if(boss.active){
    ctx.shadowColor=bossColor;
    ctx.shadowBlur=15;
    ctx.fillStyle=bossColor;

    let bx = Math.max(20, Math.min(460, boss.x));

    ctx.beginPath();
    ctx.moveTo(bx, 700);
    ctx.lineTo(bx-14, 720);
    ctx.lineTo(bx+14, 720);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur=0;
  }

  // ---- 自機（白）----
  ctx.fillStyle="white";

  let px = Math.max(20, Math.min(460, player.x));

  ctx.beginPath();
  ctx.moveTo(px, 700);
  ctx.lineTo(px-12, 720);
  ctx.lineTo(px+12, 720);
  ctx.closePath();
  ctx.fill();


  // =========================
  // ===== 自機ショット ======
  // =========================
  ctx.fillStyle="white";
  shots.forEach(s=>{
    ctx.fillRect(s.x-2,s.y-6,4,8);
  });

  // ===== 敵弾 =====
  ctx.fillStyle="magenta";
  enemyBullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,4,0,Math.PI*2);
    ctx.fill();
  });

  // ===== エフェクト =====
  ctx.fillStyle="orange";
  effects.forEach(e=>{
    if(e.big){
      ctx.beginPath();
      ctx.arc(e.x,e.y,4,0,Math.PI*2);
      ctx.fill();
    }else{
      ctx.fillRect(e.x,e.y,2,2);
    }
  });

  // ===== UI =====
  ctx.fillStyle="#fff";
  ctx.fillText(`Lives:${player.lives}`,10,40);
  ctx.fillText(`Bomb:${player.bomb}`,10,60);
  ctx.fillText(`Score:${score}`,10,80);
  ctx.fillText(`Stage ★${stage}`,10,100);

  for(let i=0;i<stage;i++){
    ctx.fillStyle="yellow";
    ctx.fillText("★",10+10*i,120);
  }

  if(paused){
    ctx.fillStyle="white";
    ctx.fillText("PAUSED",200,360);
  }
}









function overlayLoop(){
 overlayScale += overlayScaleDir;
 if(overlayScale>1.2 || overlayScale<0.8) overlayScaleDir*=-1;
 overlayTitle.style.transform = `scale(${overlayScale})`;
 requestAnimationFrame(overlayLoop);
}

function loop(){update();draw();requestAnimationFrame(loop);}
// ===== 入力改善 =====
let touchX=240,touchY=600,touching=false;
canvas.addEventListener("touchstart",e=>{
 touching=true;
 const r=canvas.getBoundingClientRect();
 touchX=e.touches[0].clientX-r.left;
 touchY=e.touches[0].clientY-r.top;
});
canvas.addEventListener("touchmove",e=>{
 const r=canvas.getBoundingClientRect();
 touchX=e.touches[0].clientX-r.left;
 touchY=e.touches[0].clientY-r.top;
});
canvas.addEventListener("touchend",()=>touching=false);

// Zキー常時連射
document.addEventListener("keydown",e=>{
 if(e.key==='z') autoFire=true;
});
document.addEventListener("keyup",e=>{
 if(e.key==='z') autoFire=false;
});

// ===== Lunatic専用・狂気弾幕 =====
function lunaticHell(x,y,t){
 for(let i=0;i<80;i++){
   let a=i*Math.PI*2/80 + t*0.03;
   let spd=2+Math.sin(t*0.1+i)*2;
   enemyBullets.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});
 }
}

// ===== Update改造 =====
const oldUpdate = update;
update = function(){
 oldUpdate();

 // ===== スマホ操作 =====
let touching=false;
let touchX=240,touchY=600;

canvas.addEventListener("touchstart",e=>{
  touching=true;
  const r=canvas.getBoundingClientRect();
  touchX=e.touches[0].clientX-r.left;
  touchY=e.touches[0].clientY-r.top;

  autoFire=true; // タップで連射

  // 左下でボム
  if(touchX < 120 && touchY > 600 && player.bomb>0){
    player.bomb--;
    player.bombing=120;
    enemyBullets=[];
    lasers=[];
    effect(player.x,player.y,120);
  }
});

canvas.addEventListener("touchmove",e=>{
  const r=canvas.getBoundingClientRect();
  touchX=e.touches[0].clientX-r.left;
  touchY=e.touches[0].clientY-r.top;
});

canvas.addEventListener("touchend",()=>{
  touching=false;
  autoFire=false;
});



 // ZまたはXで常時連射
 if(autoFire && timer%4===0) shoot6();

 // Shift低速＝当たり判定小
 player.r = keys['Shift']?3:6;

 // Lunaticだけ追加弾幕
 if(boss.active && DIFF===diffData.Lunatic && timer%25===0){
   lunaticHell(boss.x,boss.y,timer);
 }

 // 画面外制限
 player.x=Math.max(10,Math.min(470,player.x));
 player.y=Math.max(10,Math.min(710,player.y));
}
function bossExplosion(x,y){

  // 大量パーティクル
  for(let i=0;i<200;i++){
    let a = Math.random()*Math.PI*2;
    let sp = Math.random()*6+2;
    effects.push({
      x,y,
      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp,
      t:80,
      big:true
    });
  }

  // 星状衝撃波
  for(let i=0;i<40;i++){
    let a=i*Math.PI*2/40;
    enemyBullets.push({
      x,y,
      vx:Math.cos(a)*5,
      vy:Math.sin(a)*5
    });
  }
}

// ===== Overlayアニメ起動 =====
overlayLoop();

</script>
</body>
</html>
