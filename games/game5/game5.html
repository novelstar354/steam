engine.gravity.y=1.05;

/* 🍎 本家サイズ比 */
const toggleBtn = document.getElementById("toggleUI");
const uiPanel = document.getElementById("uiPanel");

let uiOpen = false;

toggleBtn.onclick = () => {
  uiOpen = !uiOpen;

  if (uiOpen) {
    uiPanel.classList.add("open");
    dim.classList.add("active");
    document.getElementById("topBar").classList.add("hide");

    // タブ開いたら既存レーザーを非表示
    document.querySelectorAll(".laser").forEach(l => l.classList.add("hidden"));
  } else {
    uiPanel.classList.remove("open");
    dim.classList.remove("active");
    document.getElementById("topBar").classList.remove("hide");

    // タブ閉じたらレーザー再表示
    document.querySelectorAll(".laser").forEach(l => l.classList.remove("hidden"));

    drawLaser(); // レーザーを再描画
  }
};
document.addEventListener("pointerdown", e=>{
  if(!uiPanel.contains(e.target) && e.target !== toggleBtn){
    uiPanel.classList.remove("open");
    dim.classList.remove("active");
    document.getElementById("topBar").classList.remove("hide"); // ←追加
    uiOpen = false;
  }
});
const closeBtn = document.getElementById("closeUI");

closeBtn.onclick = ()=>{
  uiPanel.classList.remove("open");
  dim.classList.remove("active");
  document.getElementById("topBar").classList.remove("hide");
  uiOpen = false;
};

let fruits=[];

let score=0,highScore=0;
let current=0,next=0;
let canDrop=true,gameOver=false;
let overTimer=0;
let guideX=180;
function generateFruits(list){
  activeFruitList = [...list]; // ← 確定用に保存
  fruits = list.map((e,i)=>({
    e:e,
    r:14 + i*4,
    s:10 * Math.pow(2,i),
    d:0.001 + i*0.0003
  }));
}
//let tempFruitList = []; // 一時的にプリセットを保持する配列

// プリセットボタン押下
function applyPreset(name){
  const list = PRESETS[name];

  tempFruitList = [...list]; // ← 一時保存だけ

  buildEditor(list.length);
  editor.querySelectorAll("input").forEach((input,i)=>{
    input.value = list[i];
  });
}

// 「適用」ボタン押下で確定
document.getElementById("applyBtn").onclick = ()=>{
  const inputs = editor.querySelectorAll("input");
  const list = Array.from(inputs).map(i=>i.value || "🍏");

  generateFruits(list);

  // ★ 保存（ここだけ）
  localStorage.setItem("fruitList", JSON.stringify(list));

  // ★ current / next を保存用に固定
  current = 0;
  next = 1;

  save(); // ← これ追加（重要）

  updateUI();
};
const editor = document.getElementById("fruitEditor");

function buildEditor(count){
  editor.innerHTML = "";
  for(let i=0;i<count;i++){
    const input = document.createElement("input");
    input.value = ["🍒","🍓","🍇","🍊","🍎","🍐","🍑","🍍","🍈","🍉"][i] || "🍏";
    input.style.width = "40px";
    editor.appendChild(input);
  }
}

 Bodies.rectangle(180,540,360,40,{isStatic:true}),
 Bodies.rectangle(-10,260,20,520,{isStatic:true}),

]);

function scale(){
 const s=Math.min(window.innerWidth/380,window.innerHeight/640,1);
 wrap.style.transform=`scale(${s})`;
}
window.addEventListener("resize",scale);

function rand(){return Math.floor(Math.random()*3);}

function updateUI(){
  scoreEl.textContent = score;
  highEl.textContent = highScore;
  suikaEl.textContent = suikaCount;

  // トップバー
  document.getElementById("topCurrent").textContent = fruits[current].e;
  document.getElementById("topNext").textContent = fruits[next].e;

  // UIパネル
  document.getElementById("uiCurrent").textContent = fruits[current].e;
  document.getElementById("uiNext").textContent = fruits[next].e;
  document.getElementById("uiScore").textContent = score;
  document.getElementById("uiHigh").textContent = highScore;
  document.getElementById("uiSuikaCount").textContent = suikaCount;
  drawLaser(); // レーザー再描画
}

function emojiTex(e,s){
 const c=document.createElement("canvas");
 c.width=c.height=s*2;
 const ctx=c.getContext("2d");
 ctx.font=`${s}px serif`;
 ctx.textAlign="center";
 ctx.textBaseline="middle";
 ctx.fillText(e,s,s);
 return c.toDataURL();
}

function createFruit(x,t,y=40){
 const f=fruits[t];
 const b=Bodies.circle(x,y,f.r,{
  density:f.d,
  restitution:0.05,
  friction:0.2,
  render:{
    sprite:{texture:emojiTex(f.e,f.r*2)},
    strokeStyle:"#22d3ee",
    lineWidth:2
  }
 });
const dim = document.getElementById("dim");

toggleBtn.onclick = () => {
    uiOpen = !uiOpen;

    if (uiOpen) {
        uiPanel.classList.add("open");
        dim.classList.add("active");
        document.getElementById("topBar").classList.add("hide");

        drawLaser(); // ここでレーザー消去
    } else {
        uiPanel.classList.remove("open");
        dim.classList.remove("active");
        document.getElementById("topBar").classList.remove("hide");

        drawLaser(); // ここでレーザー再描画
    }
};
 // ネオン発光（これが超重要）
 b.render.shadowColor = "#22d3ee";
 b.render.shadowBlur = 20;

 b.fruitType=t;
 b.isMerging=false;
 Sleeping.set(b,false);
 return b;
}

function drop(){
 if(!canDrop||gameOver) return;
 World.add(engine.world,createFruit(guideX,current));
 current=next;
 next=rand();
 updateUI();
 canDrop=false;
 setTimeout(()=>canDrop=true,450);
 save();
}

function fullReset(){
 engine.world.bodies
  .filter(b=>b.fruitType!==undefined)
  .forEach(b=>World.remove(engine.world,b));

 score=0;
 gameOver=false;
 overTimer=0;
 guide.style.display="block";
 overEl.style.display="none";

 current=rand();
 next=rand();
 updateUI();
    suikaCount=0;

localStorage.removeItem(SAVE_KEY);
}
document.getElementById("fruitCount").onchange = (e)=>{
  buildEditor(parseInt(e.target.value));
};
function save(){
 const data=engine.world.bodies
  .filter(b=>b.fruitType!==undefined)
  .map(b=>({x:b.position.x,y:b.position.y,t:b.fruitType}));
 localStorage.setItem(SAVE_KEY, JSON.stringify({
  score, highScore, current, next, gameOver, suikaCount, data
}));
}

function load(){
 const d=JSON.parse(localStorage.getItem(SAVE_KEY)||"null");
 if(!d){
  current = 0;
  next = 1;
  updateUI();
  return;
}
 score=d.score||0;
suikaCount = d.suikaCount || 0;
 highScore=d.highScore||0;
 current=d.current??rand();
 next=d.next??rand();
 updateUI();
 d.data?.forEach(f=>World.add(engine.world,createFruit(f.x,f.t,f.y)));
}

let touching = false;
let startInside = false;

canvas.addEventListener("touchstart", e=>{
  if(gameOver) return;

  const r = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX;
  const y = e.touches[0].clientY;

  startInside =
    x >= r.left && x <= r.right &&
    y >= r.top  && y <= r.bottom;

  if(!startInside) return;

  touching = true;

  const cx = x - r.left;
  guideX = Math.max(20, Math.min(340, cx));
  updateUI();

  e.preventDefault();
}, {passive:false});

canvas.addEventListener("touchmove", e=>{
  if(!touching) return;

  const r = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - r.left;
  guideX = Math.max(20, Math.min(340, x));
  updateUI();

  e.preventDefault();
}, {passive:false});

canvas.addEventListener("touchend", e=>{
  if(!touching || !startInside) return;

  touching = false;
  startInside = false;

  drop();
}, {passive:false});

canvas.addEventListener("pointermove", e=>{
 if(gameOver) return;
 const r=canvas.getBoundingClientRect();
 guideX=Math.max(20,Math.min(340,e.clientX-r.left));
 updateUI();
});
//canvas.addEventListener("pointerdown",drop);



document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft"||e.key==="a") guideX=Math.max(20,guideX-10);
 if(e.key==="ArrowRight"||e.key==="d") guideX=Math.min(340,guideX+10);

 if(e.key===" "||e.key==="Enter"){
   e.preventDefault();
   drop();
 }

 if(e.key==="r") fullReset();
 updateUI();
    //suikaCount=0;
});

});


Events.on(engine,"collisionStart",e=>{
 e.pairs.forEach(p=>{
  const a=p.bodyA, b=p.bodyB;
// マージ成功時
  if(a.fruitType===b.fruitType && !a.isMerging && !b.isMerging){
   a.isMerging = b.isMerging = true;
   const t = a.fruitType;

   if(t === fruits.length - 1){ // スイカの場合
  suikaCount++; // カウンター増加
    score += 1500;
  updateUI(); // UI反映
  setTimeout(()=>{
    World.remove(engine.world,[a,b]); // 消す
    save();
  }, 80);
  return;
}

   // 通常のマージ処理
   score += fruits[t].s;
   highScore = Math.max(highScore, score);
   updateUI();
   const x = (a.position.x + b.position.x)/2;
   const y = (a.position.y + b.position.y)/2;
   setTimeout(()=>{
     World.remove(engine.world,[a,b]);
     World.add(engine.world,createFruit(x,t+1,y));
     save();
   },80);
  }
 });
});

Events.on(engine,"beforeUpdate",()=>{
 if(gameOver) return;

 const isDanger = engine.world.bodies.some(b=>{
   if(b.fruitType===undefined) return false;

   // 生成直後は無視（まだ上にあるため）
   if(b.position.y < 197) return false;

   const top = b.position.y - b.circleRadius;
   return top < 130;
 });

 if(isDanger){
   gameOver = true;
   guide.style.display="none";
   overEl.style.display="flex";
   save();
 }
});
const guideWrap = document.getElementById("guideWrap");

function drawLaser(){
    // タブが開いていたらレーザー描画を完全にスキップ
    if (uiOpen) {
        guideWrap.innerHTML = ""; // 古いレーザーを消す
        return;
    }

    guideWrap.innerHTML = "";

    let x = guideX;
    let angle = 0; // 真下
    let length = 460;

    for(let i=0;i<3;i++){ // 最大3回反射
        const line = document.createElement("div");
        line.className = "laser";

        line.style.left = x + "px";
        line.style.top = "0px";
        line.style.height = length + "px";
        line.style.transform = `rotate(${angle}deg)`;

        guideWrap.appendChild(line);

        // 次の反射位置
        if(x < 20){
            angle = 20;
            x = 20;
        }else if(x > 340){
            angle = -20;
            x = 340;
        }
    }
}
